<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>QR Code → Texte en AR</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #qr-video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
            font-size: 14px;
        }
        #qr-result {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: lime;
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
            font-family: monospace;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="qr-result">🔍 En attente d’un QR code...</div>
    <div id="qr-video-container">
        <video id="qr-video" width="300" height="200" style="border-radius:8px;"></video>
    </div>

    <!-- Librairies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "jsqr": "https://cdn.skypack.dev/jsqr"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import jsQR from 'jsqr';

        // --- 1. Initialisation de la scène AR avec Three.js ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); // transparent pour voir la caméra
        document.body.appendChild(renderer.domElement);
        
        // On place la caméra virtuelle un peu en avant
        camera.position.z = 5;

        // Une lumière simple
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 2, 1);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Brouillon pour contenir le texte AR
        let currentTextMesh = null;

        function createTextAR(message) {
            // Supprimer l'ancien texte
            if (currentTextMesh) {
                scene.remove(currentTextMesh);
                // nettoyer les ressources
                if (currentTextMesh.geometry) currentTextMesh.geometry.dispose();
                if (currentTextMesh.material) currentTextMesh.material.dispose();
            }
            
            // Créer un canevas pour le texte dynamique
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024;
            canvas.height = 512;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'Bold 60px Arial';
            ctx.fillStyle = 'black';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Gérer les messages longs
            let displayText = message;
            if (displayText.length > 40) displayText = displayText.substring(0, 40) + '...';
            ctx.fillText(displayText, canvas.width/2, canvas.height/2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(4, 2, 1);
            sprite.position.set(0, 0, 0);
            currentTextMesh = sprite;
            scene.add(currentTextMesh);
            
            // Faire tourner le texte doucement ? Optionnel
            // (ici on ne fait que l'afficher fixe)
        }

        // Animation simple pour que la caméra virtuelle ne soit pas figée
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. Scanner le QR code via la caméra réelle ---
        const video = document.getElementById('qr-video');
        const resultDiv = document.getElementById('qr-result');

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            await video.play();
            requestAnimationFrame(scanQRCode);
        }

        function scanQRCode() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) {
                requestAnimationFrame(scanQRCode);
                return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, canvas.width, canvas.height);
            
            if (code) {
                const text = code.data;
                resultDiv.innerHTML = `✅ QR scanné : ${text}`;
                // Afficher le texte en réalité augmentée
                createTextAR(text);
                // On pourrait arrêter le scan après un premier succès, mais on continue pour changer si nouveau QR
            } else {
                resultDiv.innerHTML = `🔍 En attente d’un QR code...`;
            }
            requestAnimationFrame(scanQRCode);
        }

        setupCamera().catch(err => {
            console.error("Erreur caméra", err);
            resultDiv.innerHTML = "❌ Impossible d'accéder à la caméra. Utilisez HTTPS et autorisez l'accès.";
        });
    </script>
</body>
</html>
